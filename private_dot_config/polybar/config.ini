[colors]
background = #222222
foreground = #dddddd
accent = #88c0d0
alert = #ff5555

[bar/main]
width = 100%
height = 24pt

background = ${colors.background}
foreground = ${colors.foreground}

font-0 = monospace:size=10;2

modules-left = xworkspaces xwindow
modules-center = date
modules-right = battery network

padding-left = 1
padding-right = 1
module-margin = 1

enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-foreground = ${colors.accent}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-empty = %name%
label-empty-foreground = #777777
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M
label = %date% %time%

[module/battery]
type = custom/script
exec = apm | awk '/Battery state/ {state=$0} /Battery remaining/ {remain=$3} END {print "BAT " remain}'
interval = 30

[module/network]
type = custom/script
exec = ifconfig | awk '/^[a-z]/ {iface=$1} /status: active/ {print iface " up"; exit}'
interval = 10
